<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login administrativo — Vovó Tereza</title>
  <style>
    :root{--paper:#f6f0e4;--ink:#2a2119;--green:#254c32;--rust:#a63d25;--gold:#b68a42;--muted:#746a5f}
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 10%,#fffaf0 0,transparent 42%),var(--paper);color:var(--ink);font-family:Arial,sans-serif}
    main{width:min(440px,100%);background:#fffdf8;border:1px solid rgba(182,138,66,.45);border-radius:18px;padding:36px;box-shadow:0 24px 60px rgba(67,47,29,.13)}
    .brand{color:var(--green);font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}h1{font-family:Georgia,serif;font-size:32px;line-height:1.1;margin:12px 0 8px}p{color:var(--muted);line-height:1.55;margin:0 0 26px}.field{display:grid;gap:8px;margin-bottom:18px}label{font-weight:750;font-size:14px}input{width:100%;border:1px solid #d8cbb8;border-radius:9px;padding:14px 15px;background:#fff;font:inherit;color:var(--ink);outline:none}input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(182,138,66,.14)}button{width:100%;border:0;border-radius:9px;padding:15px;background:var(--green);color:#fff;font-weight:800;font-size:15px;cursor:pointer;transition:transform .2s ease,opacity .2s ease}button:active{transform:translateY(1px)}button:disabled{opacity:.58;cursor:wait}.message{min-height:20px;margin:14px 0 0;color:var(--rust);font-size:13px;text-align:center}.config{padding:12px;border:1px solid #e1b4a8;background:#fff4f1;border-radius:8px}
  </style>
</head>
<body>
  <main>
    <div class="brand">Vovó Tereza</div>
    <h1>Acesso administrativo</h1>
    <p>Entre com sua conta autorizada para consultar os dados reais da operação.</p>
    <form id="login-form">
      <div class="field"><label for="email">E-mail</label><input id="email" type="email" autocomplete="username" required></div>
      <div class="field"><label for="password">Senha</label><input id="password" type="password" autocomplete="current-password" required></div>
      <button id="submit" type="submit">Entrar no painel</button>
      <div id="message" class="message" role="alert" aria-live="polite"></div>
    </form>
  </main>
  <script src="supabase-config.js"></script>
  <script src="db-client.js"></script>
  <script>
    (async function(){
      const message=document.getElementById('message');
      if(!OfferDB.configured()){message.textContent='Configure a URL e a chave pública do Supabase antes de entrar.';message.classList.add('config');return}
      const existing=await OfferDB.auth.getSession();
      if(existing){location.replace('admin.html');return}
      document.getElementById('login-form').addEventListener('submit',async function(event){
        event.preventDefault();const button=document.getElementById('submit');button.disabled=true;message.textContent='';
        try{await OfferDB.auth.signIn(document.getElementById('email').value.trim(),document.getElementById('password').value);location.replace('admin.html')}
        catch(error){message.textContent='E-mail ou senha inválidos.';button.disabled=false}
      });
    })();
  </script>
</body>
</html>
